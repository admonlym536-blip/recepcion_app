name: recepcion_app
description: Sistema de recepcion logistica
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  mobile_scanner: ^3.5.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo_provision.jpg
    - assets/icon.png  # 👈 NUEVO LOGO

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"  # 👈 ESTE ES EL IMPORTANTE